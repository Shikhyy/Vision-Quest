<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer eye shape -->
  <ellipse cx="32" cy="32" rx="28" ry="18" fill="#0A0A0A" stroke="#00D4FF" stroke-width="2"/>
  <!-- Iris -->
  <circle cx="32" cy="32" r="12" fill="#7B2FBE"/>
  <!-- Pupil -->
  <circle cx="32" cy="32" r="6" fill="#0A0A0A"/>
  <!-- Eye glow highlight -->
  <circle cx="28" cy="28" r="3" fill="#00D4FF" opacity="0.8"/>
  <!-- Subtle glow ring -->
  <ellipse cx="32" cy="32" rx="28" ry="18" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
</svg>
